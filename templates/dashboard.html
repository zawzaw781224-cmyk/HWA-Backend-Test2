#bg {

<body>
    

<canvas id="canvas"></canvas>

<script>
const img = new Image();
img.src = "/static/GreateWoman.jpg";

let mouse = { x: null, y: null };

window.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

img.onload = function () {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    const pixelSize = 5;
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;

    let blocks = [];

    for (let y = 0; y < canvas.height; y += pixelSize) {
        for (let x = 0; x < canvas.width; x += pixelSize) {

            const i = (y * canvas.width + x) * 4;

            blocks.push({
                x: x,
                y: y,
                baseX: x,
                baseY: y,
                r: data[i],
                g: data[i + 1],
                b: data[i + 2],
                vx: 0,
                vy: 0
            });
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        blocks.forEach(block => {

            
            let offset = Math.sin(Date.now() * 0.002 + block.x * 0.05) * 10;

            

            
            const r = Math.min(block.r + 40, 255);
            const g = Math.min(block.g + 40, 255);
            const b = Math.min(block.b + 40, 255);

            ctx.fillStyle = "rgb(" + block.r + "," + block.g + "," + block.b + ")";

            ctx.fillRect(
                block.baseX,
                block.baseY + offset,
                pixelSize,
                pixelSize
            );
        });

        requestAnimationFrame(animate);
    }

    animate();
};
</script>


<canvas id="bg"></canvas>


<canvas id="canvas"></canvas>

<script>

const bg = document.getElementById("bg");
const bgCtx = bg.getContext("2d");

bg.width = window.innerWidth;
bg.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 200; i++) {
    stars.push({
        x: Math.random() * bg.width,
        y: Math.random() * bg.height,
        size: Math.random() * 2,
        speed: Math.random() * 0.5 + 0.2
    });
}

function animateStars() {
    bgCtx.clearRect(0, 0, bg.width, bg.height);

    stars.forEach(star => {
        star.y += star.speed;

        if (star.y > bg.height) {
            star.y = 0;
            star.x = Math.random() * bg.width;
        }
        bgCtx.shadowBlur =10;
        bgCtx.shawdowColor ="white";
        bgCtx.fillStyle = "white";
        bgCtx.beginPath();
        bgCtx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        bgCtx.fill();
    });

    requestAnimationFrame(animateStars);
}

animateStars();


window.addEventListener("resize", () => {
    bg.width = window.innerWidth;
    bg.height = window.innerHeight;
});
</script>
