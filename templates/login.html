<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .logo{
            text-align: center;
            color:#1877f2;
            font-size: 40px;
            margin-bottom: 5px;
        }
        .tagline{
            text-align: center;
            color:#555;
            margin-bottom: 20px;
        }
        h2 {
            text-align: center;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        .signup-link {
            text-align: center;
            margin-top: 15px;
        }

        .signup-link a {
            text-decoration: none;
            color: #007bff;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 10px;
        
        }
    </style>

</head>
<body>

<div class="container">
    <h1 class="logo">Burmesebook</h1>
    <p class="tagline">Connect with Burmese people around the world</p>

    <h2>Login</h2>

    <!-- error message (optional) -->
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form action="/login" method="post">

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>

    <div class="signup-link">
        <p>Don't have an account? <a href="/signup">Sign up</a></p>
    </div>

</div>

</body>
</html>
